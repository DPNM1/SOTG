<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="SOTG — Sake Of The Game. A quest-based deep learning system." />
  <title>SOTG — Sake Of The Game</title>
  <script src="https://telegram.org/js/telegram-web-app.js?60"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="app">
    <div id="loading-screen">
      <div class="loader-content">
        <div class="loader-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" fill="currentColor" style="width: 48px; height: 48px; display: inline-block;">
            <path d="M18.32 255.78L192 223.96l-91.28 68.69c-10.08 10.08-2.94 27.31 11.31 27.31h222.7c-9.44-26.4-14.73-54.47-14.73-83.38v-42.27l-119.73-87.6c-23.82-15.88-55.29-14.01-77.06 4.59L5.81 227.64c-12.38 10.33-3.45 30.42 12.51 28.14zm556.87 34.1l-100.66-50.31A47.992 47.992 0 0 1 448 196.65v-36.69h64l28.09 22.63c6 6 14.14 9.37 22.63 9.37h30.97a32 32 0 0 0 28.62-17.69l14.31-28.62a32.005 32.005 0 0 0-3.02-33.51l-74.53-99.38C553.02 4.7 543.54 0 533.47 0H296.02c-7.13 0-10.7 8.57-5.66 13.61L352 63.96 292.42 88.8c-5.9 2.95-5.9 11.36 0 14.31L352 127.96v108.62c0 72.08 36.03 139.39 96 179.38-195.59 6.81-344.56 41.01-434.1 60.91C5.78 478.67 0 485.88 0 494.2 0 504 7.95 512 17.76 512h499.08c63.29.01 119.61-47.56 122.99-110.76 2.52-47.28-22.73-90.4-64.64-111.36zM489.18 66.25l45.65 11.41c-2.75 10.91-12.47 18.89-24.13 18.26-12.96-.71-25.85-12.53-21.52-29.67z"/>
          </svg>
        </div>
        <h1 class="loader-title">S.O.T.G.</h1>
        <p class="loader-subtitle">Sake Of The Game</p>
        <div class="loader-bar"><div class="loader-bar-fill"></div></div>
      </div>
    </div>

    <header id="app-header" class="hidden">
      <div class="header-left">
        <span class="header-streak" id="header-streak"><i data-lucide="flame" style="width: 14px; height: 14px; display: inline-block; vertical-align: middle;"></i> 0</span>
      </div>
      <h1 class="header-title">S.O.T.G.</h1>
      <div class="header-right">
        <span class="header-level" id="header-level">Lv 0</span>
      </div>
    </header>

    <main id="page-container" class="hidden"></main>

    <nav id="bottom-nav" class="hidden">
      <button class="nav-btn active" data-page="quests">
        <span class="nav-icon"><i data-lucide="swords"></i></span>
        <span class="nav-label">Quests</span>
      </button>
      <button class="nav-btn" data-page="journal">
        <span class="nav-icon"><i data-lucide="book-open"></i></span>
        <span class="nav-label">Journal</span>
      </button>
      <button class="nav-btn" data-page="social">
        <span class="nav-icon"><i data-lucide="users"></i></span>
        <span class="nav-label">Squad</span>
      </button>
      <button class="nav-btn" data-page="profile">
        <span class="nav-icon"><i data-lucide="user"></i></span>
        <span class="nav-label">Profile</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal-container"></div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
